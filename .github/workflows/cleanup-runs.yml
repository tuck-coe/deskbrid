name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 4 * * 0'  # Every Sunday at 4am UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs (all workflows)
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 5
