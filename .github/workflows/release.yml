name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install cross compiler (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -yqq gcc-aarch64-linux-gnu

      - name: Install OpenSSL (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: sudo apt-get update -qq && sudo apt-get install -yqq libssl-dev

      - name: Build (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: Package tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf "deskbrid-${{ matrix.target }}.tar.gz" deskbrid cosmic-helper labwc-helper

      - name: Upload tarball to release
        uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/deskbrid-*.tar.gz
          generate_release_notes: true
