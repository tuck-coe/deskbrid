kind = "Http"
name = "deskbrid"
description = "Send actions to the deskbrid daemon via Unix socket. Backends: GNOME, Hyprland, KDE, X11."
required_level = 2
requires_approval = true

[endpoint]
method = "POST"
url = "http://localhost/deskbrid/action"
unix_socket = "$XDG_RUNTIME_DIR/deskbrid.sock"
content_type = "application/json"

[endpoint.params]
type = "action"
id = "string UUID generated per request"
action = "string action name: windows.list, windows.focus, windows.get, workspaces.list, workspaces.switch, input.keyboard, input.mouse, screenshot, clipboard.read, clipboard.write, system.info, system.capabilities, system.health, system.idle"
params = "object containing action-specific parameters"

[response]
content_type = "application/json"
success = '{ "type": "result", "id": "uuid", "ok": true, "data": { ... } }'
error = '{ "type": "result", "id": "uuid", "ok": false, "error": "code", "message": "details" }'

[response.fields]
type = "Always result for action responses"
id = "Matches the request ID"
ok = "Boolean success flag"
data = "Object payload on success"
error = "Machine-readable error code on failure"
message = "Human-readable failure details"
